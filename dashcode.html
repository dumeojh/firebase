
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>안성여고 실시간 현황 대시보드 (Firebase 버젼)</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f8f9fa; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); padding: 20px; margin: 0; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { color: var(--primary); text-align: center; margin-top: 0; border-bottom: 2px solid var(--accent); padding-bottom: 15px; margin-bottom: 25px; }
        
        .filter-section { 
            background: #f1f4f8; padding: 20px; border-radius: 10px; margin-bottom: 20px; display: flex; gap: 15px; align-items: center; flex-wrap: wrap;
        }
        .filter-group { display: flex; align-items: center; gap: 8px; }
        .filter-group label { font-weight: bold; color: var(--primary); }
        .filter-group select, .filter-group input[type="date"] { 
            padding: 8px 12px; border: 1px solid #cbd5e0; border-radius: 6px; background: white; font-size: 1em; cursor: pointer;
        }

        .status-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-weight: bold; color: #555; }
        .live-badge { background: #e74c3c; color: white; padding: 5px 12px; border-radius: 20px; font-size: 0.9em; display: inline-flex; align-items: center; gap: 5px; animation: blink 1.5s infinite; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 1.05em; }
        th, td { padding: 12px 10px; text-align: center; border-bottom: 1px solid #eee; }
        th { background-color: var(--primary); color: white; position: sticky; top: 0; z-index: 10; }
        
        .row-empty { color: #ccc; background-color: #fafafa; } 
        .row-active { background-color: #fff; color: #2c3e50; } 
        tr:hover { background-color: #f1f7fd; }

        /* 상태 뱃지 디자인 */
        .status-ing { color: #e67e22; font-weight: bold; background: #fdf2e9; padding: 4px 10px; border-radius: 20px; font-size: 0.9em; }
        .status-done { color: #27ae60; font-weight: bold; background: #e9f7ef; padding: 4px 10px; border-radius: 20px; font-size: 0.9em; }
        .status-waiting { color: #bdc3c7; font-size: 0.9em; }
        
        /* 🔥 실시간 이탈 중인 학생을 위한 깜빡임 디자인 */
        @keyframes blink { 50% { opacity: 0.4; } }
        .status-out { color: white; font-weight: bold; background: #e74c3c; padding: 4px 10px; border-radius: 20px; font-size: 0.9em; animation: blink 0.8s infinite; box-shadow: 0 0 8px rgba(231,76,60,0.6); }

        .no-data { padding: 50px; color: #a0aec0; font-weight: bold; font-size: 1.1em; }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 안성여고 수행평가 실시간 관제 센터 <span class="live-badge">🔴 LIVE</span></h1>
    
    <div class="filter-section">
        <div class="filter-group">
            <label>날짜</label>
            <input type="date" id="filterDate" onchange="renderTable()">
        </div>

        <div class="filter-group">
            <label>학년</label>
            <select id="filterGrade" onchange="renderTable()">
                <option value="">-- 선택 --</option>
                <option value="1">1학년</option>
                <option value="2">2학년</option>
                <option value="3">3학년</option>
            </select>
        </div>

        <div class="filter-group">
            <label>반</label>
            <select id="filterClass" onchange="renderTable()">
                <option value="">-- 선택 --</option>
                <option value="1">1반</option><option value="2">2반</option>
                <option value="3">3반</option><option value="4">4반</option>
                <option value="5">5반</option><option value="6">6반</option>
                <option value="7">7반</option><option value="8">8반</option>
                <option value="9">9반</option><option value="10">10반</option>
                <option value="11">11반</option><option value="12">12반</option>
            </select>
        </div>
    </div>

    <div class="status-header">
        <span id="lastUpdated">대기 중 (학생 데이터를 기다리는 중...)</span>
        <span style="font-size: 0.85em; color: #7f8c8d;">💡 새로고침 불필요 (자동 동기화 중)</span>
    </div>

    <table>
        <thead>
            <tr>
                <th width="80">번호</th>
                <th width="120">이름</th>
                <th width="150">현재 상태</th>
                <th>시작 시간</th>
                <th>업데이트 시간</th>
                <th width="250">비고 (경고현황)</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <tr><td colspan="6" class="no-data">👆 상단에서 모니터링할 학년과 반을 모두 선택해 주세요.</td></tr>
        </tbody>
    </table>
</div>

<script>
    /** ============================================================================
     * 🚨 [매우 중요] 아까 복사해두신 Firebase Config 코드를 아래에 덮어쓰세요! 🚨
     * 학생용 시험지에 넣었던 것과 완전히 똑같은 코드를 넣으시면 됩니다.
     * ============================================================================ */
/** ============================================================================
     * 🚨 [수정 완료] Firebase Config 
     * ============================================================================ */
    const firebaseConfig = {
        apiKey: "AIzaSyAi_zYqV2PtWNsy61zkxKADxirWftcBfY4",
        authDomain: "project-94b9c.firebaseapp.com",
        databaseURL: "https://project-94b9c-default-rtdb.firebaseio.com", /* 👈 빠져있던 핵심 주소 추가 완료! */
        projectId: "project-94b9c",
        storageBucket: "project-94b9c.firebasestorage.app",
        messagingSenderId: "619238103499",
        appId: "1:619238103499:web:f25b6406a913954a87fe4e"
    };
    
    // 파이어베이스 엔진 시동 켜기
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let myStatusRef = null; // 현재 학생의 개인 DB 연결선
    // ============================================================================
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    // ============================================================================

    let globalStudentData = {}; // 파이어베이스에서 받은 전체 데이터를 저장할 공간

    document.addEventListener("DOMContentLoaded", () => {
        const today = new Date();
        document.getElementById('filterDate').value = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
        
        // 🔥 파이어베이스 실시간 수신 대기 (데이터가 변할 때마다 자동으로 실행됨)
        db.ref('live_status').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                globalStudentData = data;
                renderTable(); // 데이터가 바뀌면 표를 즉시 다시 그림
                
                const now = new Date();
                document.getElementById('lastUpdated').innerText = `마지막 수신: ${now.toLocaleTimeString()}.${now.getMilliseconds()} (초고속 실시간 연결 됨)`;
            }
        });
    });

    function renderTable() {
        const selectedGrade = document.getElementById('filterGrade').value;
        const selectedClass = document.getElementById('filterClass').value;
        const tbody = document.getElementById('tableBody');

        if (!selectedGrade || !selectedClass) {
            tbody.innerHTML = '<tr><td colspan="6" class="no-data">👆 모니터링할 학년과 반을 모두 선택해 주세요.</td></tr>';
            return; 
        }

        // 해당 학년/반 학생만 필터링해서 Map에 저장
        const studentMap = {};
        for (const key in globalStudentData) {
            const student = globalStudentData[key];
            if (student['학년'] === selectedGrade && student['반'] === selectedClass) {
                studentMap[parseInt(student['번호'])] = student;
            }
        }

        tbody.innerHTML = ''; 
        
        const renderRow = (num, student, isErrorRow = false) => {
            const tr = document.createElement('tr');
            if (!student) {
                tr.className = 'row-empty';
                tr.innerHTML = `<td>${num}</td><td>-</td><td><span class="status-waiting">미접속</span></td><td>-</td><td>-</td><td>-</td>`;
                return tr;
            }

            tr.className = 'row-active';
            if (isErrorRow) tr.style.backgroundColor = '#fff9e6';

            let statusRaw = student['상태'] || '-';
            let warningCount = student['경고횟수'] || 0;
            let displayRemark = student['비고'] || '정상상태';

            // 🔥 현재 상태 뱃지 생성 (이탈 중일 때 빨간색 깜빡임 적용!)
            let statusHtml = "";
            if (statusRaw === "이탈 중") {
                statusHtml = `<span class="status-out">🚨 이탈 중! (화면 벗어남)</span>`;
            } else if (statusRaw === "제출 완료") {
                statusHtml = `<span class="status-done">🔵 제출 완료</span>`;
            } else {
                statusHtml = `<span class="status-ing">🟢 진행 중</span>`;
            }

            // 비고 글자색 지정
            let remarkColor = "#555";
            if (displayRemark.includes("강제제출")) remarkColor = "#e74c3c";
            else if (displayRemark.includes("시간초과")) remarkColor = "#8e44ad";
            else if (warningCount >= 3) remarkColor = "#d35400";
            else if (warningCount > 0) remarkColor = "#e67e22";
            else if (displayRemark.includes("정상")) remarkColor = "#27ae60";

            // 강제제출이 아니고, 제출완료도 아닌데 경고가 있으면 비고란에 알림 표시
            if (warningCount > 0 && !displayRemark.includes("제출") && statusRaw !== "제출 완료") {
                displayRemark = `⚠️ ${warningCount}회 화면이탈 누적`;
            }

            let displayNum = isErrorRow ? `<b style="color:#e74c3c; font-size:1.1em;">${num}</b>` : `<b>${num}</b>`;

            tr.innerHTML = `
                <td>${displayNum}</td>
                <td><b>${student['이름'] || '-'}</b></td>
                <td>${statusHtml}</td>
                <td>${student['시작시간'] || '-'}</td>
                <td>${student['마지막업데이트'] || '-'}</td>
                <td style="font-weight:bold; color:${remarkColor};">${displayRemark}</td>
            `;
            return tr;
        };

        // 1번부터 35번까지 렌더링
        for (let i = 1; i <= 35; i++) {
            tbody.appendChild(renderRow(i, studentMap[i], false));
        }

        // 번호 입력 오류 학생 렌더링
        const errorNums = Object.keys(studentMap).map(Number).filter(n => n > 35 || n < 1).sort((a, b) => a - b);
        if (errorNums.length > 0) {
            const trSep = document.createElement('tr');
            trSep.innerHTML = `<td colspan="6" style="background:#ffeaa7; color:#d35400; font-weight:bold; letter-spacing:1px; padding: 15px;">⚠️ 번호 입력 오류 학생 (확인 필요)</td>`;
            tbody.appendChild(trSep);

            errorNums.forEach(num => {
                tbody.appendChild(renderRow(num, studentMap[num], true));
            });
        }
    }
</script>
</body>
</html>
